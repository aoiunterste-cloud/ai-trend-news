name: Automated Weekly Digest Generation

on:
  schedule:
    # Run once a week on Friday at 11:00 UTC (20:00 JST)
    - cron: '0 11 * * 5'
  workflow_dispatch: # Allow manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Weekly Digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node scripts/generate-weekly.mjs

      - name: Commit and Push changes
        run: |
          if [[ -n $(git status -s) ]]; then
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add src/content/blog/weekly-digest-*.md public/og/weekly-digest-*.png
            
            git commit -m "📅 Add Weekly Digest"
            git push origin main
          else
            echo "No digest generated."
          fi
