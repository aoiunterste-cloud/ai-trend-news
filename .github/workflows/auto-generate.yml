name: Auto Generate Blog Post

on:
  schedule:
    # Runs at 00:00 UTC (9:00 AM JST) EVERY DAY.
    - cron: '0 0 * * *'
    # Runs at 12:00 UTC (9:00 PM JST) EVERY DAY — 2nd article of the day.
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

# Define permissions for the GITHUB_TOKEN so we can push code back to the repo
permissions:
  contents: write

env:
  # Fix for GitHub Actions Node 20 deprecation warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run AI Generation Script
        env:
          # This secret must be added in GitHub Repository Settings -> Secrets and variables -> Actions
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node scripts/generate-article.mjs
          npm run generate-og
        
      - name: Commit and Push changes
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Add new blog posts and their OG images
          git add src/content/blog/ public/og/
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No new articles generated to commit"
          else
            git commit -m "🤖 Auto-generated blog post via AI"
            git push
          fi

      - name: Request Google Indexing
        if: success()
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: node scripts/request-indexing.mjs
        continue-on-error: true  # Don't fail the workflow if indexing fails
