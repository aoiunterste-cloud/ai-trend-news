name: Automated AI Article Generation

on:
  schedule:
    # Run twice a day (e.g., 23:00 UTC and 11:00 UTC which is 8:00 JST and 20:00 JST)
    - cron: '0 23,11 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push commits back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # We only need the latest commit to push changes

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # LTS version
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate AI Article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Run the generation script
          node scripts/generate-article.mjs

      - name: Commit and Push changes
        id: commit
        run: |
          # Check if there are any changes (new markdown or images)
          if [[ -n $(git status -s) ]]; then
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add src/content/blog/*.md public/og/*.png
            
            # Extract the new filename to use in commit message
            NEW_FILE=$(git diff --name-only --cached | grep '\.md$' | head -n 1)
            COMMIT_MSG="Auto-generate AI news article"
            SLUG=""
            if [ -n "$NEW_FILE" ]; then
              SLUG=$(basename "$NEW_FILE" .md)
              COMMIT_MSG="📝 Add new article: $SLUG"
            fi

            git commit -m "$COMMIT_MSG"
            git push origin main
            
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "slug=$SLUG" >> $GITHUB_OUTPUT
          else
            echo "No new articles generated."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Astro site
        if: steps.commit.outputs.has_changes == 'true'
        run: npm run build

      - name: Deploy to Cloudflare Pages
        if: steps.commit.outputs.has_changes == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=ai-trend-news

      - name: Notify Google Search Console (Indexing API)
        if: steps.commit.outputs.has_changes == 'true'
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICE_ACCOUNT_JSON" ]; then
            echo "📡 Running Google Indexing API script..."
            node scripts/request-indexing.mjs
          else
            echo "⏩ GOOGLE_SERVICE_ACCOUNT_JSON not set in Secrets. Skipping Google Indexing API."
          fi

      - name: Submit to IndexNow & Social Platforms
        if: steps.commit.outputs.has_changes == 'true' && steps.commit.outputs.slug != ''
        run: |
          SLUG="${{ steps.commit.outputs.slug }}"
          echo "🚀 Submitting $SLUG to IndexNow, Bing, Yandex, and social platforms..."
          node scripts/auto-submit.mjs "$SLUG" || true
          echo "✅ Auto-submit completed"
